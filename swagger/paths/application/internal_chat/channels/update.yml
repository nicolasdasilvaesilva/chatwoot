tags:
  - Internal Chat Channels
operationId: update-internal-chat-channel
summary: Update a channel
security:
  - userApiKey: []
description: Update an internal chat channel's attributes
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/internal_chat_channel_update_payload'
responses:
  '200':
    description: Success
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/internal_chat_channel_show'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '403':
    description: Access denied
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '404':
    description: Channel not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
