    description: Success
    content:
      application/json:
        schema:
          type: array
          description: Array of categories
          items:
            $ref: '#/components/schemas/internal_chat_category'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
