tags:
  - Internal Chat Polls
operationId: create-internal-chat-poll
summary: Create a poll
security:
  - userApiKey: []
description: Create a new poll message in an internal chat channel
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/internal_chat_poll_create_payload'
responses:
  '201':
    description: Created
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/internal_chat_message'
  '400':
    description: Bad request (e.g. missing options)
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '402':
    description: Pro feature required (poll creation disabled on current plan)
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '404':
    description: Channel not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
