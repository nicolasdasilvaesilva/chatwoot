tags:
  - Internal Chat Channel Members
operationId: add-internal-chat-channel-members
summary: Add channel members
security:
  - userApiKey: []
description: Add one or more members to an internal chat channel
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/internal_chat_member_create_payload'
responses:
  '201':
    description: Created
    content:
      application/json:
        schema:
          type: array
          description: Array of added channel members
          items:
            $ref: '#/components/schemas/internal_chat_channel_member'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '403':
    description: Access denied
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '404':
    description: Channel not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
